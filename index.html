<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --accent: #3b82f6;
}

.light {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
}

/* Body */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
}

/* Navbar */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: var(--card);
    padding: 15px;
    text-align: center;
    font-weight: bold;
    z-index: 1000;
}

/* Controls */
.controls {
    position: fixed;
    top: 10px;
    right: 10px;
}

.controls button {
    margin-left: 5px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* Layout */
.container {
    max-width: 900px;
    margin: 100px auto;
    padding: 20px;
}

.card {
    background: var(--card);
    padding: 30px;
    border-radius: 16px;
}

/* TOC */
.toc a {
    display: block;
    margin: 5px 0;
    color: var(--accent);
    text-decoration: none;
}

/* Titles */
h2 {
    color: var(--accent);
    margin-top: 30px;
}

/* Animation */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 0.6s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}

/* Button */
.top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    border: none;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<div class="nav" id="navTitle">Privacy Policy</div>

<div class="controls">
    <button onclick="toggleLang()">🌍</button>
    <button onclick="toggleMode()">🌙</button>
</div>

<div class="container">
<div class="card">

<h1 id="title">Privacy Policy</h1>
<p><strong id="updated">Last updated:</strong> 9/4/2026</p>

<div class="toc">
<strong>Contents</strong>
<a href="#1">1. Introduction</a>
<a href="#2">2. Data</a>
<a href="#3">3. Security</a>
</div>

<h2 id="1" class="fade">1. Introduction</h2>
<p class="fade" id="intro">We protect your privacy.</p>

<h2 id="2" class="fade">2. Data</h2>
<p class="fade" id="data">We collect minimal data.</p>

<h2 id="3" class="fade">3. Security</h2>
<p class="fade" id="sec">Your data is safe.</p>

</div>
</div>

<button class="top-btn" id="topBtn">↑</button>

<script>
// Animation
const items = document.querySelectorAll('.fade');

function reveal() {
    items.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 50) {
            el.classList.add('show');
        }
    });
}
window.addEventListener('scroll', reveal);
reveal();

// Scroll button
window.onscroll = function () {
    document.getElementById("topBtn").style.display =
        document.documentElement.scrollTop > 300 ? "block" : "none";
};

document.getElementById("topBtn").onclick = function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

// Dark Mode
function toggleMode() {
    document.body.classList.toggle("light");
}

// Language Toggle
let isEnglish = true;

function toggleLang() {
    isEnglish = !isEnglish;

    if (isEnglish) {
        document.getElementById("title").innerText = "Privacy Policy";
        document.getElementById("navTitle").innerText = "Privacy Policy";
        document.getElementById("updated").innerText = "Last updated:";
        document.getElementById("intro").innerText = "We protect your privacy.";
        document.getElementById("data").innerText = "We collect minimal data.";
        document.getElementById("sec").innerText = "Your data is safe.";
    } else {
        document.getElementById("title").innerText = "سياسة الخصوصية";
        document.getElementById("navTitle").innerText = "سياسة الخصوصية";
        document.getElementById("updated").innerText = "آخر تحديث:";
        document.getElementById("intro").innerText = "نحن نحمي خصوصيتك.";
        document.getElementById("data").innerText = "نجمع أقل قدر من البيانات.";
        document.getElementById("sec").innerText = "بياناتك آمنة.";
    }
}
</script>

</body>
</html>
