<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Policy</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --card: rgba(30,41,59,0.6);
    --text: #e2e8f0;
    --accent: #3b82f6;
}

.light {
    --bg: #f1f5f9;
    --card: rgba(255,255,255,0.7);
    --text: #0f172a;
    --accent: #2563eb;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.5s;
}

/* Navbar */
.nav {
    position: fixed;
    top: 0;
    width: 100%;
    backdrop-filter: blur(10px);
    background: var(--card);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

/* Buttons */
.controls {
    position: fixed;
    top: 15px;
    right: 15px;
}

.controls button {
    margin-left: 5px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* Layout */
.container {
    max-width: 1000px;
    margin: 100px auto;
    padding: 20px;
}

.card {
    background: var(--card);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
}

/* Text */
h2 {
    color: var(--accent);
    margin-top: 40px;
}

p {
    line-height: 1.8;
}

/* Animations */
.fade {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.6s;
}
.show {
    opacity: 1;
    transform: translateY(0);
}

/* Button */
.top-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    border: none;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
}

/* TOC */
.toc a {
    display: block;
    margin: 5px 0;
    color: var(--accent);
    text-decoration: none;
}
</style>
</head>

<body>

<div class="nav">Privacy Policy</div>

<div class="controls">
    <button onclick="toggleLang()">🌍</button>
    <button onclick="toggleMode()">🌙</button>
</div>

<div class="container">
<div class="card">

<h1 id="title">Privacy Policy</h1>

<div class="toc">
<a href="#1">1</a>
<a href="#2">2</a>
<a href="#3">3</a>
</div>

<h2 id="1" class="fade"><i class="fa fa-shield"></i> Introduction</h2>
<p class="fade" id="intro">We protect your privacy.</p>

<h2 id="2" class="fade"><i class="fa fa-database"></i> Data</h2>
<p class="fade" id="data">We collect minimal data.</p>

<h2 id="3" class="fade"><i class="fa fa-lock"></i> Security</h2>
<p class="fade" id="sec">Your data is safe.</p>

</div>
</div>

<button class="top-btn" id="topBtn">↑</button>

<script>
// Scroll animation
const items = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
    items.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 50) {
            el.classList.add('show');
        }
    });

    document.getElementById("topBtn").style.display =
        document.documentElement.scrollTop > 300 ? "block" : "none";
});

// Scroll to top
topBtn.onclick = () => window.scrollTo({top:0,behavior:'smooth'});

// Dark mode
function toggleMode(){
    document.body.classList.toggle("light");
}

// Language toggle
let en = true;
function toggleLang(){
    const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    clickSound.play();

    en = !en;
    if(en){
        title.innerText = "Privacy Policy";
        intro.innerText = "We protect your privacy.";
        data.innerText = "We collect minimal data.";
        sec.innerText = "Your data is safe.";
    } else {
        title.innerText = "سياسة الخصوصية";
        intro.innerText = "نحن نحمي خصوصيتك.";
        data.innerText = "نجمع أقل قدر من البيانات.";
        sec.innerText = "بياناتك آمنة.";
    }
}
</script>

</body>
</html>
